<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Gestão Amolação</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #0F4C81, #1A6D8F); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; }
        .login-card { background: white; border-radius: 25px; padding: 40px; max-width: 420px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .login-card h2 { color: #0F4C81; font-weight: 700; }
        .login-card .logo { font-size: 60px; color: #0F4C81; }
        .btn-primary { background: linear-gradient(135deg, #0F4C81, #1A6D8F); border: none; border-radius: 12px; padding: 12px; font-weight: 600; }
        .btn-primary:hover { transform: scale(1.02); }
        .form-control { border-radius: 12px; padding: 12px 15px; }
        .form-control:focus { box-shadow: 0 0 0 3px rgba(15,76,129,0.2); border-color: #0F4C81; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <i class="fas fa-user-plus logo"></i>
            <h2 class="mt-2">Criar Conta</h2>
            <p class="text-muted">Crie sua conta de administrador</p>
        </div>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'success' if category == 'success' else 'danger' }} alert-dismissible fade show">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-bold">Seu Nome</label>
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="fas fa-id-card"></i></span>
                    <input type="text" name="nome" class="form-control" placeholder="Digite seu nome" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Usuário</label>
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="fas fa-user"></i></span>
                    <input type="text" name="usuario" class="form-control" placeholder="Digite seu usuário" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Senha</label>
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="fas fa-lock"></i></span>
                    <input type="password" name="senha" class="form-control" placeholder="Mínimo 4 caracteres" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Confirmar Senha</label>
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="fas fa-check"></i></span>
                    <input type="password" name="confirmar" class="form-control" placeholder="Digite a senha novamente" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100"><i class="fas fa-save me-2"></i>Criar Conta</button>
        </form>
        <div class="text-center mt-3"><a href="{{ url_for('auth.login') }}" class="text-muted">Já tem conta? Faça login</a></div>
        <hr>
        <p class="text-center text-muted small">Versão 2.0 - Amolação Profissional</p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
