<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Gestão Amolação</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="text-center mb-4">
            <i class="fas fa-user-plus logo"></i>
            <h2 class="mt-2">Criar Conta</h2>
            <p class="text-muted">Crie sua conta de administrador</p>
        </div>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'success' if category == 'success' else 'danger' }} alert-dismissible fade show">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Seu Nome</label>
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="fas fa-id-card"></i></span>
                    <input type="text" name="nome" class="form-control" placeholder="Digite seu nome" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Usuário</label>
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="fas fa-user"></i></span>
                    <input type="text" name="usuario" class="form-control" placeholder="Digite seu usuário" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Senha</label>
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="fas fa-lock"></i></span>
                    <input type="password" name="senha" class="form-control" placeholder="Mínimo 4 caracteres" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Confirmar Senha</label>
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="fas fa-check"></i></span>
                    <input type="password" name="confirmar" class="form-control" placeholder="Digite a senha novamente" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100"><i class="fas fa-save me-2"></i>Criar Conta</button>
        </form>
        <div class="text-center mt-3"><a href="{{ url_for('auth.login') }}" class="text-muted">Já tem conta? Faça login</a></div>
        <hr>
        <p class="text-center text-muted small mb-0">Versão 2.0</p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
