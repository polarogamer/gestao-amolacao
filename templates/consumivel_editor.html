{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h1><i class="fas fa-edit"></i>Editar Insumo</h1>
</div>
<div class="card p-4">
    <form method="POST">
        <div class="mb-3"><label class="form-label">Nome</label><input type="text" name="nome" class="form-control" value="{{ item.nome }}" required></div>
        <div class="row"><div class="col-md-6"><label class="form-label">Quantidade</label><input type="number" name="quantidade" class="form-control" value="{{ item.quantidade }}"></div><div class="col-md-6"><label class="form-label">Unidade</label><input type="text" name="unidade" class="form-control" value="{{ item.unidade }}"></div></div>
        <div class="row"><div class="col-md-6"><label class="form-label">Estoque Mínimo</label><input type="number" name="estoque_minimo" class="form-control" value="{{ item.estoque_minimo }}"></div><div class="col-md-6"><label class="form-label">Preço Unitário (R$)</label><input type="text" name="preco_unitario" class="form-control" value="{{ item.preco_unitario|replace('.', ',') if item.preco_unitario else '0,00' }}"></div></div>
        <button type="submit" class="btn btn-primary mt-3"><i class="fas fa-save me-2"></i>Salvar</button>
        <a href="/consumiveis" class="btn btn-outline-secondary mt-3"><i class="fas fa-times me-2"></i>Cancelar</a>
    </form>
</div>
{% endblock %}
