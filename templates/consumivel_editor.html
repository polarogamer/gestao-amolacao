{% extends "base.html" %}
{% block content %}
<div class="card p-4">
    <h2><i class="fas fa-edit me-2"></i>Editar Insumo</h2>
    <form method="POST">
        <div class="mb-3"><label class="form-label">Nome</label><input type="text" name="nome" class="form-control" value="{{ item.nome }}" required></div>
        <div class="row"><div class="col-md-6"><label>Quantidade</label><input type="number" name="quantidade" class="form-control" value="{{ item.quantidade }}"></div><div class="col-md-6"><label>Unidade</label><input type="text" name="unidade" class="form-control" value="{{ item.unidade }}"></div></div>
        <div class="row"><div class="col-md-6"><label>Estoque Mínimo</label><input type="number" name="estoque_minimo" class="form-control" value="{{ item.estoque_minimo }}"></div><div class="col-md-6"><label>Preço Unitário (R$)</label><input type="text" name="preco_unitario" class="form-control" value="{{ item.preco_unitario|replace('.', ',') if item.preco_unitario else '0,00' }}"></div></div>
        <button type="submit" class="btn btn-primary"><i class="fas fa-save me-2"></i>Salvar</button>
        <a href="/consumiveis" class="btn btn-secondary"><i class="fas fa-times me-2"></i>Cancelar</a>
    </form>
</div>
{% endblock %}
