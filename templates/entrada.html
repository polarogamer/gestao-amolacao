{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h1><i class="fas fa-inbox"></i>Entrada de Clientes</h1>
</div>
<div class="info-bar {% if qtd_hoje >= meta_diaria %}info-bar--danger{% elif qtd_hoje >= meta_diaria * 0.8 %}info-bar--warning{% endif %}">
    <div><strong>Hoje:</strong> {{ datetime.now().strftime('%d/%m/%Y') }} | <strong>Peças recebidas:</strong> {{ qtd_hoje }}/{{ meta_diaria }}{% if qtd_hoje >= meta_diaria %} — <strong>limite atingido, não é possível cadastrar mais hoje</strong>{% endif %}</div>
    <form method="POST" action="{{ url_for('entrada.entrada_meta') }}" class="d-flex gap-1 align-items-center">
        <label class="small mb-0">Meta do dia:</label>
        <input type="number" name="meta_diaria" value="{{ meta_diaria }}" class="form-control form-control-sm" style="width:80px">
        <button class="btn btn-sm btn-outline-secondary">Salvar</button>
    </form>
</div>
<div class="card p-4">
    <form method="POST">
        <div class="row">
            <div class="col-md-6"><label class="form-label">Nome do Cliente *</label><input name="nome" class="form-control" placeholder="Ex: Maria Santos" required></div>
            <div class="col-md-6"><label class="form-label">Telefone</label><input name="telefone" class="form-control" placeholder="(11) 99999-9999"></div>
        </div>
        <div class="row mt-3">
            <div class="col-md-6"><label class="form-label">O que trouxe?</label>
                <select name="codigo_servico" id="codigo_servico" class="form-select" onchange="sugerirPreco()">
                    <option value="AT" data-preco="20,00">AT - Alicate</option>
                    <option value="T" data-preco="15,00">T - Tesoura</option>
                    <option value="TP" data-preco="5,00">TP - Tesoura Pequena</option>
                    <option value="TM" data-preco="15,00">TM - Tesoura Média</option>
                    <option value="TG" data-preco="20,00">TG - Tesoura Grande</option>
                    <option value="M" data-preco="20,00">M - Mola</option>
                </select>
            </div>
            <div class="col-md-6"><label class="form-label">Tipo de Serviço</label><select name="tipo_servico" class="form-select"><option value="Amolação">Amolação</option><option value="Troca de Mola">Troca de Mola</option><option value="Venda">Venda</option></select></div>
        </div>
        <div class="row mt-3">
            <div class="col-md-3"><label class="form-label">Quantidade</label><input name="quantidade" type="number" class="form-control" value="1" id="qtd" onchange="calcTotal()" min="1"></div>
            <div class="col-md-3"><label class="form-label">Valor Unitário (R$)</label><input name="valor_unitario" class="form-control" placeholder="0,00" id="vu" onchange="calcTotal()" value="20,00"></div>
            <div class="col-md-3"><label class="form-label">Valor Total (R$)</label><input name="valor_total" class="form-control" id="total" readonly style="background:#e9ecef"></div>
            <div class="col-md-3"><label class="form-label">Data Prometida</label><input name="data_prometida" type="date" class="form-control" value="{{ (datetime.now() + timedelta(days=2)).strftime('%Y-%m-%d') }}"></div>
        </div>
        <div class="row mt-3">
            <div class="col-md-6">
                <label class="form-label">Pagamento</label>
                <div class="d-flex gap-3 form-control-sm" style="height:38px; align-items:center;">
                    <div class="form-check form-check-inline mb-0">
                        <input class="form-check-input" type="radio" name="pagamento_status" id="pg_retirada" value="retirada" checked onchange="togglePagamento()">
                        <label class="form-check-label" for="pg_retirada">Vai pagar na retirada</label>
                    </div>
                    <div class="form-check form-check-inline mb-0">
                        <input class="form-check-input" type="radio" name="pagamento_status" id="pg_agora" value="agora" onchange="togglePagamento()">
                        <label class="form-check-label" for="pg_agora">Já pagou agora</label>
                    </div>
                </div>
            </div>
            <div class="col-md-6" id="forma_pagamento_wrap" style="display:none">
                <label class="form-label">Forma de Pagamento</label>
                <select name="forma_pagamento" id="forma_pagamento" class="form-select">
                    <option value="">Selecione</option>
                    <option value="Pix">Pix</option>
                    <option value="Espécie">Espécie</option>
                </select>
            </div>
        </div>
        <div class="mt-3"><label class="form-label">Observação</label><textarea name="observacao" class="form-control" rows="2" placeholder="Ex: Cliente trouxe 2 alicates"></textarea></div>
        <button type="submit" class="btn btn-primary mt-3 w-100" {% if qtd_hoje >= meta_diaria %}disabled{% endif %}><i class="fas fa-check me-2"></i>Salvar e Gerar Código</button>
    </form>
</div>
<script>
function calcTotal(){let q=document.getElementById('qtd').value||1;let v=document.getElementById('vu').value.replace(',','.')||0;let total=(parseFloat(q)*parseFloat(v)).toFixed(2);document.getElementById('total').value=total.replace('.',',');}
function sugerirPreco(){
    let sel = document.getElementById('codigo_servico');
    let preco = sel.options[sel.selectedIndex].getAttribute('data-preco');
    document.getElementById('vu').value = preco;
    calcTotal();
}
function togglePagamento(){
    let agora = document.getElementById('pg_agora').checked;
    let wrap = document.getElementById('forma_pagamento_wrap');
    let select = document.getElementById('forma_pagamento');
    wrap.style.display = agora ? 'block' : 'none';
    select.required = agora;
    if (!agora) select.value = '';
}
calcTotal();
</script>
{% endblock %}
